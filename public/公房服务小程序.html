<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公房服务</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #e8f2fc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* 手机壳 */
  .phone-wrap {
    position: relative;
    width: 375px;
    height: 812px;
    background: #f0f7ff;
    border-radius: 40px;
    border: 2px solid #B5D4F4;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(24,95,165,0.18);
    flex-shrink: 0;
  }

  /* 页面层 */
  .page {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    background: #f0f7ff;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    will-change: transform;
  }
  .page.slide-out { transform: translateX(-100%); }
  .page.slide-in  { transform: translateX(0); }
  .page.off-right { transform: translateX(100%); }

  /* 状态栏 */
  .status-bar {
    height: 28px;
    background: #185FA5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    flex-shrink: 0;
  }
  .status-bar span { color: #fff; font-size: 11px; }

  /* 顶部导航 */
  .top-nav {
    background: #185FA5;
    flex-shrink: 0;
  }
  .nav-title-row {
    height: 46px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
  }
  .nav-title-row .title {
    flex: 1;
    text-align: center;
    color: #fff;
    font-size: 16px;
    font-weight: 500;
  }
  .back-btn {
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    padding: 4px 4px 4px 0;
    line-height: 1;
    user-select: none;
  }
  .more-btn {
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    user-select: none;
  }

  /* 搜索栏 */
  .search-wrap {
    padding: 6px 12px 10px;
    background: #185FA5;
  }
  .search-bar {
    background: #EAF4FF;
    border-radius: 22px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    height: 38px;
    gap: 8px;
  }
  .search-bar input {
    border: none;
    background: transparent;
    flex: 1;
    font-size: 13px;
    outline: none;
    color: #0C447C;
  }
  .search-bar input::placeholder { color: #85B7EB; }
  .search-icon { color: #378ADD; font-size: 15px; }
  .filter-btn {
    font-size: 12px;
    color: #185FA5;
    background: #fff;
    border: none;
    border-radius: 12px;
    padding: 2px 9px;
    cursor: pointer;
    font-weight: 500;
  }

  /* 筛选标签栏 */
  .filter-row {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: #fff;
    border-bottom: 0.5px solid #B5D4F4;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .tag {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 12px;
    border: 0.5px solid #B5D4F4;
    color: #185FA5;
    background: #E6F1FB;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }
  .tag.active {
    background: #185FA5;
    color: #fff;
    border-color: #185FA5;
  }

  /* 统计栏 */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 8px 0;
    background: #fff;
    border-bottom: 0.5px solid #B5D4F4;
    flex-shrink: 0;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .stat-num {
    font-size: 18px;
    font-weight: 600;
    color: #185FA5;
  }
  .stat-num.green { color: #3B6D11; }
  .stat-label {
    font-size: 10px;
    color: #888780;
  }

  /* 列表 */
  .list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .list-wrap::-webkit-scrollbar { width: 0; }

  /* 卡片 — 大卡片 */
  .card {
    background: #fff;
    border-radius: 14px;
    border: 0.5px solid #B5D4F4;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.12s, box-shadow 0.12s;
  }
  .card:active { background: #E6F1FB; }
  .card-thumb {
    width: 100%;
    height: 90px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .thumb-placeholder {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
  }
  .thumb-badge {
    position: absolute;
    bottom: 6px;
    left: 8px;
    font-size: 10px;
    color: #0C447C;
    background: rgba(255,255,255,0.88);
    padding: 1px 6px;
    border-radius: 5px;
  }
  .pano-badge {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 10px;
    color: #185FA5;
    background: rgba(255,255,255,0.92);
    padding: 2px 7px;
    border-radius: 5px;
    font-weight: 500;
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: #0C447C;
  }
  .card-addr {
    font-size: 12px;
    color: #5F5E5A;
    margin-bottom: 8px;
  }
  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .meta-item {
    font-size: 11px;
    color: #5F5E5A;
    background: #F0F7FF;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .meta-item.price {
    color: #185FA5;
    font-weight: 500;
  }

  /* 加载更多 */
  .load-more-wrap {
    text-align: center;
    padding: 12px 0 4px;
  }
  .load-more-btn {
    font-size: 12px;
    color: #185FA5;
    background: #E6F1FB;
    border: 0.5px solid #B5D4F4;
    border-radius: 18px;
    padding: 6px 24px;
    cursor: pointer;
    font-weight: 500;
  }
  .load-more-btn:active { background: #B5D4F4; }
  .load-more-hint {
    font-size: 11px;
    color: #B5D4F4;
    margin-top: 4px;
  }

  .badge {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 9px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-idle    { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #97C459; }
  .badge-rented  { background: #E6F1FB; color: #185FA5; border: 0.5px solid #85B7EB; }
  .badge-normal  { background: #E6F1FB; color: #185FA5; border: 0.5px solid #85B7EB; }
  .badge-abnormal{ background: #FCE4E4; color: #B91C1C; border: 0.5px solid #F87171; }
  .badge-signed  { background: #E6F1FB; color: #185FA5; border: 0.5px solid #85B7EB; }
  .badge-unsigned{ background: #FCE4E4; color: #B91C1C; border: 0.5px solid #F87171; }
  .badge-expired { background: #FAEEDA; color: #854F0B; border: 0.5px solid #EF9F27; }
  .badge-paid    { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #97C459; }
  .badge-unpaid  { background: #FCE4E4; color: #B91C1C; border: 0.5px solid #F87171; }

  /* 详情页 */
  .detail-body {
    flex: 1;
    overflow-y: auto;
  }
  .detail-body::-webkit-scrollbar { width: 0; }

  /* 照片区 */
  .photo-section {
    position: relative;
    flex-shrink: 0;
  }
  .photo-slider {
    display: flex;
    overflow: hidden;
    position: relative;
    height: 210px;
  }
  .photo-counter {
    position: absolute;
    bottom: 10px;
    left: 14px;
    font-size: 11px;
    color: #fff;
    background: rgba(0,0,0,0.3);
    padding: 2px 8px;
    border-radius: 6px;
  }
  .photo-dots {
    position: absolute;
    bottom: 10px;
    right: 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .pdot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    transition: all 0.2s;
  }
  .pdot.on {
    background: #fff;
    width: 14px;
    border-radius: 3px;
  }
  .pano-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(255,255,255,0.92);
    border-radius: 10px;
    padding: 5px 10px;
    font-size: 12px;
    color: #185FA5;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    border: none;
    user-select: none;
  }
  .pano-btn-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid #185FA5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #185FA5;
  }

  /* 详情标题区 */
  .detail-header {
    padding: 12px 14px 6px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: #fff;
    border-bottom: 0.5px solid #E6F1FB;
  }
  .detail-title { font-size: 16px; font-weight: 500; color: #0C447C; margin-bottom: 4px; }
  .detail-addr { font-size: 12px; color: #888780; }

  /* 信息分组 */
  .section {
    background: #fff;
    margin: 8px 12px;
    border-radius: 14px;
    border: 0.5px solid #B5D4F4;
    padding: 12px 14px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: #185FA5;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 0.5px solid #B5D4F4;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::before {
    content: '';
    display: block;
    width: 3px;
    height: 13px;
    background: #185FA5;
    border-radius: 2px;
  }
  .field-row {
    display: flex;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 0.5px solid #F0F7FF;
  }
  .field-row:last-child { border-bottom: none; }
  .field-label {
    font-size: 12px;
    color: #888780;
    width: 96px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .field-value {
    font-size: 12px;
    color: #2C2C2A;
    flex: 1;
    line-height: 1.5;
  }
  .field-value.price { color: #185FA5; font-weight: 500; font-size: 13px; }

  /* 全景弹层 */
  .pano-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #042C53;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .pano-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .pano-title { color: #fff; font-size: 15px; font-weight: 500; }
  .pano-screen {
    width: 340px;
    height: 210px;
    background: linear-gradient(180deg, #042C53 0%, #185FA5 45%, #378ADD 100%);
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pano-play-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .pano-play-icon { color: #fff; font-size: 22px; padding-left: 3px; }
  .pano-name { color: rgba(255,255,255,0.85); font-size: 12px; margin-top: 8px; }
  .pano-hint-text { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; }
  .pano-progress {
    width: 280px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .pano-progress-bar {
    height: 100%;
    background: #85B7EB;
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }
  .pano-status { font-size: 12px; color: #85B7EB; }
  .pano-close-btn {
    color: #85B7EB;
    font-size: 12px;
    cursor: pointer;
    padding: 7px 18px;
    border: 0.5px solid #378ADD;
    border-radius: 18px;
    background: transparent;
  }

  /* 空状态 */
  .empty {
    padding: 40px 0;
    text-align: center;
    color: #B5D4F4;
    font-size: 13px;
  }

  /* 渐显动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeInUp 0.18s ease both; }
</style>
</head>

<div class="phone-wrap" id="app">

  <!-- ===== 列表页 ===== -->
  <div class="page slide-in" id="listPage">
    <div class="status-bar"><span>9:41</span><span style="letter-spacing:2px">●●●</span></div>
    <div class="top-nav">
      <div class="nav-title-row">
        <span style="width:24px"></span>
        <span class="title">公房服务</span>
        <span class="more-btn">&#8942;</span>
      </div>
      <div class="search-wrap">
        <div class="search-bar">
          <span class="search-icon">&#9906;</span>
          <input id="searchInput" placeholder="搜索公房名称、地址..." />
          <button class="filter-btn" onclick="toggleFilter()">筛选</button>
        </div>
      </div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label">全部</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="statRented">0</span>
        <span class="stat-label">出租</span>
      </div>
      <div class="stat-item">
        <span class="stat-num green" id="statIdle">0</span>
        <span class="stat-label">未出租</span>
      </div>
    </div>

    <!-- 筛选标签 -->
    <div class="filter-row" id="filterRow">
      <span class="tag active" data-status="all"    onclick="selectTag(this,'status')">全部</span>
      <span class="tag"        data-status="rented"   onclick="selectTag(this,'status')">出租</span>
      <span class="tag"        data-status="idle"     onclick="selectTag(this,'status')">未出租</span>
    </div>

    <div class="list-wrap" id="cardList"></div>
  </div>

  <!-- ===== 详情页 ===== -->
  <div class="page off-right" id="detailPage">
    <div class="status-bar"><span>9:41</span><span style="letter-spacing:2px">●●●</span></div>
    <div class="top-nav">
      <div class="nav-title-row">
        <span class="back-btn" onclick="goBack()">&#8249;</span>
        <span class="title" id="detailNavTitle">公房详情</span>
        <span class="more-btn">&#8942;</span>
      </div>
    </div>

    <div class="detail-body" id="detailBody"></div>

    <!-- 全景弹层 -->
    <div class="pano-overlay" id="panoOverlay">
      <p class="pano-title" id="panoTitle">720° 全景视频</p>
      <div class="pano-screen">
        <div style="display:flex;flex-direction:column;align-items:center">
          <div class="pano-play-btn" id="panoPlayBtn" onclick="togglePano()">
            <span class="pano-play-icon" id="panoIcon">&#9654;</span>
          </div>
          <p class="pano-name" id="panoName">全景漫游</p>
          <p class="pano-hint-text">左右滑动旋转视角</p>
        </div>
      </div>
      <div class="pano-progress"><div class="pano-progress-bar" id="panoBar"></div></div>
      <p class="pano-status" id="panoStatus">点击播放</p>
      <button class="pano-close-btn" onclick="closePano()">关闭全景</button>
    </div>

  </div><!-- end detailPage -->

</div><!-- end phone-wrap -->

// ========== 状态 ==========
let currentFilter = { status: 'all' };
let currentSearch = '';
let currentHouse = null;
let currentPhoto = 0;
let panoTimer = null;
let panoProgress = 0;
const PAGE_SIZE = 20;
let currentPage = 1;
let filteredList = [];

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
  updateStats();
  renderList();
  document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value.trim();
    currentPage = 1;
    renderList();
  });
});

// ========== 统计 ==========
function updateStats() {
  const total = houses.length;
  const rented = houses.filter(h => h.status === 'rented').length;
  const idle = houses.filter(h => h.status === 'idle').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRented').textContent = rented;
  document.getElementById('statIdle').textContent = idle;
}

// ========== 筛选标签 ==========
function selectTag(el, type) {
  const row = document.getElementById('filterRow');
  row.querySelectorAll('[data-status]').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter.status = el.dataset.status;
  currentPage = 1;
  renderList();
}

function toggleFilter() {
  const fr = document.getElementById('filterRow');
  fr.style.display = fr.style.display === 'none' ? 'flex' : 'none';
}

// ========== 渲染列表 ==========
function renderList() {
  const wrap = document.getElementById('cardList');
  const kw = currentSearch.toLowerCase();
  filteredList = houses.filter(h => {
    const matchStatus = currentFilter.status === 'all' || h.status === currentFilter.status;
    const matchSearch = !kw || h.name.toLowerCase().includes(kw) || h.addr.toLowerCase().includes(kw);
    return matchStatus && matchSearch;
  });

  if (filteredList.length === 0) {
    wrap.innerHTML = '<div class="empty">暂无符合条件的公房</div>';
    return;
  }

  const showList = filteredList.slice(0, currentPage * PAGE_SIZE);
  const hasMore = showList.length < filteredList.length;

  wrap.innerHTML = showList.map(h => `
    <div class="card" onclick="openDetail(${h.id})">
      <div class="card-thumb" style="background:${h.photos[0].bg}">
        <span class="thumb-placeholder">房屋实景照片</span>
        <span class="thumb-badge">${h.photos.length} 张照片</span>
        ${h.hasPano ? '<span class="pano-badge">&#9654; 全景</span>' : ''}
      </div>
      <div class="card-top">
        <span class="card-name">${h.name}</span>
        <span class="badge badge-${h.status}">${h.statusText}</span>
      </div>
      <div class="card-addr">&#128205; ${h.addr}</div>
      <div class="card-meta">
        ${h.meta.map(m => `<span class="meta-item">${m}</span>`).join('')}
      </div>
    </div>
  `).join('');

  if (hasMore) {
    wrap.innerHTML += `
      <div class="load-more-wrap">
        <button class="load-more-btn" onclick="loadMore()">加载更多</button>
        <div class="load-more-hint">已显示 ${showList.length} / ${filteredList.length} 条</div>
      </div>`;
  } else {
    wrap.innerHTML += `<div class="load-more-hint" style="text-align:center;padding:10px 0 4px">共 ${filteredList.length} 条，已全部加载</div>`;
  }
}

function loadMore() {
  currentPage++;
  renderList();
  // 滚动到新加载的内容
  const wrap = document.getElementById('cardList');
  const cards = wrap.querySelectorAll('.card');
  if (cards.length > PAGE_SIZE) {
    const targetIdx = (currentPage - 1) * PAGE_SIZE;
    if (cards[targetIdx]) {
      cards[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
}

// ========== 打开详情 ==========
function openDetail(id) {
  currentHouse = houses.find(h => h.id === id);
  if (!currentHouse) return;
  currentPhoto = 0;

  document.getElementById('detailNavTitle').textContent = currentHouse.name;
  renderDetail();

  document.getElementById('listPage').classList.add('slide-out');
  document.getElementById('listPage').classList.remove('slide-in');
  document.getElementById('detailPage').classList.remove('off-right');
  document.getElementById('detailPage').classList.add('slide-in');
}

function renderDetail() {
  const h = currentHouse;
  const photos = h.photos;

  const dots = photos.map((_, i) => `<div class="pdot ${i===0?'on':''}" id="pdot${i}"></div>`).join('');

  const renderRows = (fields) => fields.map(f => {

      return `<div class="field-row">
        <span class="field-label">${f.label}</span>
        <span class="field-value"><span class="badge badge-${f.badge}">${f.value}</span></span>
      </div>`;
    }
    return `<div class="field-row">
      <span class="field-label">${f.label}</span>
      <span class="field-value ${f.cls||''}">${f.value}</span>

  document.getElementById('detailBody').innerHTML = `
    <div class="photo-section">
      <div class="photo-slider" id="photoSlider" style="position:relative;overflow:hidden">
        <div id="sliderTrack" style="position:absolute;top:0;left:0;width:${photos.length*100}%;height:100%;display:flex;transition:transform 0.3s ease">
          ${photos.map((p, i) => `
            <div style="width:${100/photos.length}%;height:100%;background:${p.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <span style="color:rgba(255,255,255,0.75);font-size:12px">第 ${i+1} 张 · 实景照片</span>

// ========== 返回列表 ==========
function goBack() {
  stopPano();
  document.getElementById('listPage').classList.remove('slide-out');
  document.getElementById('listPage').classList.add('slide-in');
  document.getElementById('detailPage').classList.remove('slide-in');
  document.getElementById('detailPage').classList.add('off-right');
}

// ========== 照片轮播 ==========
function initPhotoSwipe() {
  const slider = document.getElementById('photoSlider');
  if (!slider) return;
  let startX = 0;
  slider.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  slider.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 40) {
      if (diff < 0) nextPhoto();
      else prevPhoto();
    }
  });
  slider.addEventListener('mousedown', e => { startX = e.clientX; });
  slider.addEventListener('mouseup', e => {
    const diff = e.clientX - startX;
    if (Math.abs(diff) > 30) {
      if (diff < 0) nextPhoto();
      else prevPhoto();
    }
  });
}

function nextPhoto() { setPhoto(currentPhoto + 1); }
function prevPhoto() { setPhoto(currentPhoto - 1); }

function setPhoto(idx) {
  const photos = currentHouse.photos;
  idx = Math.max(0, Math.min(photos.length - 1, idx));
  currentPhoto = idx;
  const track = document.getElementById('sliderTrack');
  if (track) track.style.transform = `translateX(-${idx * (100 / photos.length)}%)`;
  const counter = document.getElementById('photoCounter');
  if (counter) counter.textContent = `${idx + 1} / ${photos.length}`;
  document.querySelectorAll('.pdot').forEach((d, i) => d.classList.toggle('on', i === idx));
}

function openPano() {
  document.getElementById('panoOverlay').classList.add('show');
  panoProgress = 0;
  document.getElementById('panoBar').style.width = '0%';
  document.getElementById('panoStatus').textContent = '点击播放';
  document.getElementById('panoIcon').innerHTML = '&#9654;';
}

function closePano() {
  stopPano();
  document.getElementById('panoOverlay').classList.remove('show');
}

function togglePano() {
  if (panoTimer) {
    stopPano();
  } else {
    startPano();
  }
}

function startPano() {
  document.getElementById('panoIcon').innerHTML = '&#9646;&#9646;';
  document.getElementById('panoStatus').textContent = '全景播放中...';
  panoTimer = setInterval(() => {
    panoProgress += 1;
    document.getElementById('panoBar').style.width = panoProgress + '%';
    if (panoProgress >= 100) {
      stopPano();
      document.getElementById('panoStatus').textContent = '播放完成';
    }
  }, 80);
}

function stopPano() {
  if (panoTimer) { clearInterval(panoTimer); panoTimer = null; }
  const icon = document.getElementById('panoIcon');
  if (icon) icon.innerHTML = '&#9654;';
}
</script>
</body>
</html>
